services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthmanager
      POSTGRES_USER: ${DB_USER:?DB_USER must be set}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:?DB_USER must be set}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.5"

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:?DB_USER must be set}:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/healthmanager
      - CORS_ORIGINS=http://localhost:${PORT:-8080}${DOMAIN:+,https://${DOMAIN}}
      - OLLAMA_LOCAL_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - HEALTH_CHECK_SECRET=${HEALTH_CHECK_SECRET:?HEALTH_CHECK_SECRET must be set}
      - RUN_SCHEDULER=false
    volumes:
      - app-data:/app/data
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:?DB_USER must be set}:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/healthmanager
      - OLLAMA_LOCAL_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - HEALTH_CHECK_SECRET=${HEALTH_CHECK_SECRET:?HEALTH_CHECK_SECRET must be set}
      - RUN_SCHEDULER=true
    volumes:
      - app-data:/app/data
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: []
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1", "--log-level", "info"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - DOMAIN=${DOMAIN:-}
      - EMAIL=${EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

networks:
  frontend:
  backend:
    internal: true

volumes:
  pg-data:
  app-data:
  ollama-data:
  redis-data:
  caddy-data:
  caddy-config:
